<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog {{version}} — {{companyName}}</title>
  <meta name="description" content="{{intro}}">
  <meta property="og:title" content="Changelog {{version}} — {{companyName}}">
  <meta property="og:description" content="{{intro}}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --brand: {{brandColor}};
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --card-bg: #ffffff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    .layout { display: flex; max-width: 900px; margin: 0 auto; padding: 48px 24px; gap: 64px; }
    .sidebar { width: 200px; flex-shrink: 0; }
    .sidebar-sticky { position: sticky; top: 24px; }
    .sidebar h3 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 12px; }
    .sidebar nav a { display: block; font-size: 0.875rem; color: var(--muted); text-decoration: none; padding: 4px 0; transition: color 0.15s; }
    .sidebar nav a:hover { color: var(--brand); }
    .main { flex: 1; min-width: 0; }
    .version-header { margin-bottom: 32px; }
    .version-tag {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand);
      background: color-mix(in srgb, var(--brand) 10%, white);
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 12px;
    }
    h1 { font-size: 1.875rem; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
    .intro { color: var(--muted); }
    .date { font-size: 0.8125rem; color: var(--muted); }
    .section { margin: 40px 0; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .section-label.new { background: #dcfce7; color: #15803d; }
    .section-label.improved { background: #dbeafe; color: #1d4ed8; }
    .section-label.fixed { background: #fef9c3; color: #92400e; }
    .section-label.breaking { background: #fee2e2; color: #b91c1c; }
    .section-label.default { background: #f1f5f9; color: #475569; }
    .item { border-left: 2px solid var(--border); padding-left: 20px; margin-bottom: 24px; }
    .item h3 { font-size: 0.9375rem; font-weight: 600; margin: 0 0 6px; }
    .item p { margin: 0; font-size: 0.9rem; color: #475569; }
    .cta-block { margin-top: 56px; padding: 32px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; text-align: center; }
    .cta-block p { color: var(--muted); margin: 0 0 16px; }
    .cta-btn { display: inline-block; background: var(--brand); color: white; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    footer { text-align: center; margin-top: 64px; font-size: 0.8125rem; color: var(--muted); padding-bottom: 48px; }
    @media (max-width: 700px) {
      .layout { flex-direction: column; gap: 32px; }
      .sidebar { width: 100%; }
      .sidebar-sticky { position: static; }
    }
    @media print { .sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-sticky">
        {{#if logoUrl}}<img src="{{logoUrl}}" alt="{{companyName}}" style="height:28px; margin-bottom:24px;">{{/if}}
        <h3>Contents</h3>
        <nav>
          {{#each sections}}
          <a href="#section-{{@index}}">{{title}}</a>
          {{/each}}
        </nav>
      </div>
    </aside>
    <main class="main">
      <div class="version-header">
        <div class="version-tag">{{version}}</div>
        <h1>{{headline}}</h1>
        <p class="intro">{{intro}}</p>
        <p class="date">Released {{formatDate date}}</p>
      </div>

      {{#each sections}}
      <div class="section" id="section-{{@index}}">
        <div class="section-header">
          <span class="section-label {{#eq title "New Features"}}new{{else}}{{#eq title "Bug Fixes"}}fixed{{else}}{{#eq title "Breaking Changes"}}breaking{{else}}{{#eq title "Improvements"}}improved{{else}}default{{/eq}}{{/eq}}{{/eq}}{{/eq}}">
            {{title}}
          </span>
        </div>
        {{#each items}}
        <div class="item">
          <h3>{{title}}</h3>
          <p>{{description}}</p>
        </div>
        {{/each}}
      </div>
      {{/each}}

      <div class="cta-block">
        <p>{{intro}}</p>
        <a href="{{cta.url}}" class="cta-btn">{{cta.text}}</a>
      </div>

      {{#if footer}}<footer>{{footer}}</footer>{{/if}}
    </main>
  </div>
</body>
</html>
